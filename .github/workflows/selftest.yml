name: 自鸣棋自检

# 改了游戏(index.html)或自检脚本并 push → headless 跑 #selftest；挂了 → 本 job 失败 → GitHub 邮件通知。
# 让“游戏改坏了”在学生玩之前先被抓到（Pages 是 push 即上线、本身没验证）。
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'selftest.mjs'
  workflow_dispatch: {}

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm i --no-save playwright@^1.48.0
      - run: npx playwright install --with-deps chromium
      - name: 跑 #selftest（自动读取总数 · 挂了就失败）
        run: node selftest.mjs
